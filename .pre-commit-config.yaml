repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: local
    hooks:
      - id: no-google-credentials
        name: Don't commit Google credentials
        entry: google-vision-sa.*\\.json
        language: pygrep
        types: [file]
        stages: [pre-commit]
