name: KYC ruleset fetch + extract (weekly)

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to 'true' to fetch without extraction"
        required: false
        default: "false"

jobs:
  fetch-and-extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch all sources
        run: |
          PYTHONPATH=. python -m sources.fetcher.fetcher

      - name: Run extraction (skip on dry-run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PYTHONPATH=. python -c "
          from sources.extractor import run_extraction
          run_extraction()
          "

      - name: Run regression gate
        run: |
          PYTHONPATH=. pytest tests/ -q --tb=short

      - name: Upload staging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staged-overlays-${{ github.run_id }}
          path: rules/staging/
          retention-days: 30
