---
# KYC Apexon — Regulatory Source Registry
# Static catalogue of sources the fetcher monitors.
# Edit to add/remove sources. fetch_state.yaml tracks live fetch state.
#
# fetch_method (per URL):
#   http_head     — HEAD request; hash change detection on ETag/Content-Length
#   http_get      — GET request; hash of response body
#   playwright    — JS-rendered page; hash of rendered DOM text
#   rss           — RSS/Atom feed; parse entries for new items
#   api_status    — Government API / digital-ID endpoint; health-check only,
#                   no hash extraction, no LLM extraction in Phase 5
#
# parse_mode (per source):
#   llm           — Phase 5 extractor reads content and produces overlay JSON
#   direct        — Sanctions lists; bypass LLM, parsed by dedicated parser
#   none          — api_status sources; no content to parse
#
# active: false   — Registered but not fetched (placeholder jurisdictions or
#                   sources pending scope confirmation)

schema_version: "1.0"

sources:

